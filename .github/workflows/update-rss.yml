name: Update RSS Feed

on:
  schedule:
    # ירוץ אוטומטית בכל יום בשעה 06:00 בבוקר (זמן UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # מאפשר לך להריץ את האוטומציה ידנית מתי שתרצה לבדיקה

jobs:
  build:
    runs-on: ubuntu-latest
    
    # החזרת משתנה הסביבה כדי להשתיק את האזהרה של גיטהאב
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.2.2

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    # התקנה חכמה: אם קיים package.json נשתמש בו, אם לא - נתקין ישירות את החבילות הנחוצות
    - name: Install dependencies
      run: |
        if [ -f package.json ]; then
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
        else
          echo "No package.json found. Installing axios and cheerio directly..."
          npm install axios cheerio
        fi

    - name: Run Scraper
      run: node scraper.js

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add feed.xml
        # נבצע קומיט רק אם הקובץ אכן השתנה, כדי למנוע שגיאות בריצות ריקות
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update RSS feed" && git push origin master)
